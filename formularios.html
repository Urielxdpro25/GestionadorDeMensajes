<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="LogoUncos.png">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#0f5739">
    <title>Gestionador de Mensajes</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(90deg, #0f5739, #3d8e66, #45c9a4, #46b5a9, #52c9eb);
            padding: 20px 10px;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 25px;
            font-size: 2rem;
        }

        .p {
            color: white;
            font-size: 14px;
        }

        .form {
            background: rgba(255, 255, 255, .95);
            width: 100%;
            max-width: 560px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .2);
        }

        fieldset {
            border: 1px solid #d6e8df;
            border-radius: 10px;
            padding: 15px;
        }

        legend {
            color: #0f5739;
            font-weight: bold;
            padding: 0 10px;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 6px;
            font-weight: bold;
            color: #20493b;
        }

        input {
            width: 100%;
            height: 48px;
            padding: 10px;
            font-size: 17px;
            border-radius: 8px;
            border: 1px solid #c7d9d1;
        }

        input:focus {
            outline: none;
            border-color: #1fe099;
            box-shadow: 0 0 0 3px rgba(31, 224, 153, .25);
        }

        .btn {
            width: 100%;
            height: 55px;
            margin-top: 25px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #1fe099);
            transition: .3s;
        }

        .btn:hover {
            transform: scale(1.02);
        } 

        #mensajeCopiado {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f5739;
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            display: none;
            font-weight: bold;
        }

  
    </style> 

</head>

<body>

    <h1>Gestionador de Mensajes</h1>

    <form id="form-conferenciante" class="form">

        <fieldset>

            <legend>Información Conferenciante</legend>

            <label for="nombre">Nombre y apellido Conferenciante:</label>
            <input type="text" id="nombre">


            <label for="titulo">Título Conferencia:</label>
            <input type="text" id="titulo">

            <label for="numero">Número Conferencia:</label>
            <input type="text" id="numero">

            <label for="titulo-Cantico">Título Cántico:</label>
            <input type="text" id="titulo-Cantico">

            <label for="numero-Cantico">Número Cántico:</label>
            <input type="text" id="numero-Cantico">

            <label for="nombre-Congregacion">Nombre Congregación Conferenciante:</label>
            <input type="text" id="nombre-Congregacion">

            <button type="button" class="btn" onclick="copiarFormulario('form-conferenciante')">
                📋 Copiar al Portapapeles
            </button>

        </fieldset>

    </form>


    <form id="form-mensaje" class="form">

        <fieldset>

            <legend>Información del Mensaje</legend>

            <label for="nom-Presidente" class="presidente">Nombre y Apellido Presidente:</label>
            <input type="text" id="nom-Presidente">

            <label for="oracion-Ini">Oración Inicial:</label>
            <input type="text" id="oracion-Ini">

            <label for="nom-Lector">Nombre y Apellido Lector:</label>
            <input type="text" id="nom-Lector">

            <label for="oracion-Fin">Oración Final:</label>
            <input type="text" id="oracion-Fin">

            <button type="button" class="btn" onclick="copiarFormulario('form-mensaje')">
                📋 Copiar al Portapapeles
            </button>

        </fieldset>
    </form>
    <button class="btn" onclick="window.location.href='index.html'">Volver al Inicio</button>
    <div id="mensajeCopiado">
        ✅ ¡Información copiada al portapapeles!
    </div>


    <footer class="footer">
        <p class="p">© 2026 Gestionador de Mensajes. Todos los derechos reservados. La Doble U.</p>
    </footer>




    <script>

        async function copiarFormulario(formId) {

            const form = document.getElementById(formId);

            let mensaje = "";

            if (formId === "form-conferenciante") {
                mensaje = "Hola, aquí va la información del conferenciante:\n\n";
            } else if (formId === "form-mensaje") {
                const nomPresidente = document.getElementById("nom-Presidente").value.trim();
                mensaje = nomPresidente ? `Hola, ${nomPresidente}\n\n` : "Aquí va la información de la reunión:\n\n";
            }

            form.querySelectorAll("input").forEach(input => {

                // Si es el formulario de reunión, no volver a mostrar el presidente
                if (formId === "form-mensaje" && input.id === "nom-Presidente") {
                    return;
                }

                const label = form.querySelector(`label[for="${input.id}"]`);

                if (input.value.trim() !== "") {

                    mensaje += `${label.textContent} ${input.value.trim()}\n`;

                }

            });

            try {

                await navigator.clipboard.writeText(mensaje);

            } catch {

                const textarea = document.createElement("textarea");

                textarea.value = mensaje;
                textarea.style.position = "fixed";
                textarea.style.opacity = "0";

                document.body.appendChild(textarea);

                textarea.focus();
                textarea.select();
                textarea.setSelectionRange(0, 99999);

                document.execCommand("copy");

                document.body.removeChild(textarea);

            }

            const aviso = document.getElementById("mensajeCopiado");

            aviso.style.display = "block";

            if (formId === "form-conferenciante") {
                aviso.textContent = "✅ Información del conferenciante copiada.";
            } else {
                aviso.textContent = "✅ Información de la reunión copiada.";
            }

            setTimeout(() => {
                aviso.style.display = "none";
            }, 2000);


        }

        if ("serviceWorker" in navigator) {

            navigator.serviceWorker.register("service-worker.js")
                .then(() => console.log("Service Worker registrado"))
                .catch(err => console.log(err));

        }

    </script>

</body>

</html>
